<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đánh giá tiêu chí theo phương án - AHP Location</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body,
      html {
        width: 100%;
        max-width: 100vw;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      .result-container {
        width: 100%;
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 16px;
        font-family: "Inter", sans-serif;
        box-sizing: border-box;
        overflow-x: hidden;
      }

      /* ── Header ── */
      .result-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 16px;
      }

      .result-title {
        font-size: 24px;
        font-weight: 800;
        color: #1e293b;
        letter-spacing: -0.5px;
      }

      .result-title span {
        background: linear-gradient(135deg, #0057cd, #0d6efd);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-weight: 500;
        font-size: 14px;
        color: #334155;
        text-decoration: none;
        transition: all 0.2s;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        cursor: pointer;
      }

      .back-btn:hover {
        background: #f8fafc;
        border-color: #cbd5e1;
        transform: translateY(-1px);
      }

      .result-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 8px;
        font-weight: 500;
        font-size: 14px;
        color: #0057cd;
        text-decoration: none;
        transition: all 0.2s;
        box-shadow: 0 1px 2px rgba(0, 87, 205, 0.08);
        cursor: pointer;
      }

      .result-btn:hover {
        background: #dbeafe;
        border-color: #93c5fd;
        transform: translateY(-1px);
      }

      /* ── Summary Card ── */
      .summary-card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 24px;
        font-size: 14px;
        color: #334155;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
      }

      /* ── Tab Bar ── */
      .criteria-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .criteria-tab-btn {
        padding: 9px 18px;
        border-radius: 10px;
        border: 1.5px solid #e2e8f0;
        background: #fff;
        font-family: "Inter", sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: #475569;
        cursor: pointer;
        transition: all 0.2s;
      }

      .criteria-tab-btn:hover {
        border-color: #93c5fd;
        color: #0057cd;
        background: #eff6ff;
      }

      .criteria-tab-btn.active {
        background: linear-gradient(135deg, #0057cd, #0d6efd);
        color: #fff;
        border-color: transparent;
        box-shadow: 0 4px 12px rgba(0, 87, 205, 0.3);
      }

      /* ── Criteria Panel ── */
      .criteria-panel {
        background: #fff;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
        overflow: hidden;
      }

      .criteria-panel-header {
        padding: 16px 20px;
        border-bottom: 1px solid #f1f5f9;
        background: linear-gradient(
          135deg,
          rgba(99, 102, 241, 0.04),
          rgba(59, 130, 246, 0.03)
        );
      }

      .criteria-panel-badge {
        display: inline-block;
        padding: 3px 10px;
        background: rgba(0, 87, 205, 0.1);
        color: #0057cd;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        border: 1px solid rgba(0, 87, 205, 0.2);
        margin-bottom: 6px;
      }

      .criteria-panel-title {
        font-size: 16px;
        font-weight: 800;
        color: #1e293b;
        margin-bottom: 2px;
      }

      .criteria-panel-desc {
        font-size: 12px;
        color: #64748b;
      }

      /* ── Matrix Table ── */
      .matrix-wrap {
        overflow-x: auto;
        padding: 16px 20px;
        -webkit-overflow-scrolling: touch;
      }

      .matrix-table {
        border-collapse: collapse;
        font-size: 13px;
        min-width: 100%;
      }

      .matrix-table th {
        background: #f8fafc;
        font-weight: 600;
        font-size: 12px;
        color: #475569;
        padding: 10px 14px;
        border: 1px solid #e2e8f0;
        white-space: nowrap;
      }

      .matrix-table td {
        padding: 10px 14px;
        border: 1px solid #e2e8f0;
        text-align: center;
        font-weight: 500;
        color: #1e293b;
        white-space: nowrap;
      }

      .matrix-table td.row-header {
        text-align: left;
        font-weight: 600;
        background: #f8fafc;
        color: #334155;
      }

      /* Cell colors */
      .cell-equal {
        background: #fff;
        color: #64748b;
      }

      .cell-better {
        background: #f0fdf4;
        color: #15803d;
        font-weight: 700;
      }

      .cell-worse {
        background: #fff1f2;
        color: #b91c1c;
        font-weight: 700;
      }

      /* Weight column */
      .weight-cell {
        background: #eff6ff;
        color: #0057cd;
        font-weight: 800;
        border-left: 2px solid #bfdbfe !important;
      }

      .weight-header {
        background: #dbeafe;
        color: #1d4ed8;
      }

      /* ── Legend ── */
      .legend {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        padding: 12px 20px 16px;
        border-top: 1px solid #f1f5f9;
        font-size: 12px;
        color: #64748b;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .legend-dot {
        width: 12px;
        height: 12px;
        border-radius: 4px;
        flex-shrink: 0;
      }

      /* ── Loading / Error ── */
      .state-loading {
        text-align: center;
        padding: 40px;
        color: #0057cd;
        font-weight: 600;
        font-size: 15px;
        animation: pulse 1.4s ease-in-out infinite;
      }

      .state-error {
        text-align: center;
        padding: 40px;
        color: #b91c1c;
        background: #fff1f2;
        border-radius: 12px;
        font-size: 14px;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* ── Responsive ── */
      @media screen and (max-width: 640px) {
        .result-container {
          padding: 0 12px;
          margin: 20px auto;
        }

        .result-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .result-title {
          font-size: 20px;
        }

        .criteria-tab-btn {
          font-size: 12px;
          padding: 7px 13px;
        }
      }
    </style>
  </head>

  <body style="background-color: #f0f4ff">
    <div class="result-container">
      <!-- ── Header ── -->
      <div class="result-header">
        <h1 class="result-title">
          Đánh giá tiêu chí <span>theo phương án</span>
        </h1>
        <div
          style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap"
        >
          <a href="result.html" class="result-btn">
            <svg
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2.5"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
              />
            </svg>
            Xem kết quả xếp hạng
          </a>
          <a href="index.html" class="back-btn">
            <svg
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2.5"
                d="M15 19l-7-7 7-7"
              />
            </svg>
            Quay lại
          </a>
        </div>
      </div>

      <!-- ── Summary Card ── -->

      <!-- ── Tab Bar ── -->
      <div class="criteria-tabs" id="criteriaTabs">
        <!-- Rendered by JS -->
      </div>

      <!-- ── Criteria Panel ── -->
      <div id="criteriaPanel">
        <div class="criteria-panel">
          <div class="state-loading">⏳ Đang phân tích ma trận...</div>
        </div>
      </div>
    </div>

    <script src="js/criteria-evaluation.js"></script>
  </body>
</html>
